<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OrigamiCraft - Fold Simulator (MVP)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=Noto+Sans+KR:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
  <!-- GPUMath Canvas for parallel physics computation -->
  <canvas id="gpuMathCanvas" style="display:none;"></canvas>

    <div id="app">
      <span id="hint" class="is-hidden"></span>
      <div id="controlHint" aria-label="조작 가이드">
        <div class="control-item">
          <span class="mouse-icon is-middle" aria-hidden="true">
            <span class="mouse-body"></span>
            <span class="mouse-btn left"></span>
            <span class="mouse-btn middle"></span>
            <span class="mouse-btn right"></span>
          </span>
          <span class="control-text">카메라 조작</span>
        </div>
        <div class="control-item">
          <span class="mouse-icon is-left" aria-hidden="true">
            <span class="mouse-body"></span>
            <span class="mouse-btn left"></span>
            <span class="mouse-btn middle"></span>
            <span class="mouse-btn right"></span>
          </span>
          <span class="control-text">접힘선 만들기</span>
        </div>
        <div class="control-item">
          <span class="mouse-icon is-right" aria-hidden="true">
            <span class="mouse-body"></span>
            <span class="mouse-btn left"></span>
            <span class="mouse-btn middle"></span>
            <span class="mouse-btn right"></span>
          </span>
          <span class="control-text">종이 접기</span>
        </div>
      </div>
      <div id="topActions" aria-label="템플릿 선택">
        <label for="templateSelector" style="display:none;">접기 템플릿 선택:</label>
        <select id="templateSelector">
          <option value="airplane">비행기 접기</option>
          <option value="flower">꽃 접기</option>
        </select>
      </div>
      
      <div id="bottomActions" aria-label="빠른 조작 버튼">
        <button id="btnSpread" type="button" style="display: none; background: #ff5722; color: white;">날개 펴기</button>
        <button id="btnUndo" type="button">되돌리기</button>
        <button id="btnFlip" type="button">뒤집기</button>
        <button id="btnStand" type="button">세우기</button>
      </div>
      <canvas id="scene"></canvas>
    </div>

    <script type="module" src="./app.js?v=34"></script>
  </body>
</html>
